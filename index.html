<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Venüs Bowling & Cafe | Premium Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a017; /* Gold */
            --primary-light: #fdf6e3;
            --dark: #1e272e;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --bg: #ffffff;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding-top: 170px; overflow-x: hidden; }

        /* HEADER SECTION */
        .header-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #f1f1f1;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
            letter-spacing: -1px;
            margin: 0;
        }
        .brand-logo span { color: var(--primary); }

        /* BÜYÜK VE BELİRGİN KATEGORİLER */
        .nav-scroller {
            overflow-x: auto;
            padding: 10px 20px 20px;
            display: flex;
            gap: 12px;
            scrollbar-width: none;
        }
        .nav-scroller::-webkit-scrollbar { display: none; }

        .nav-pill {
            background: #f8f9fa;
            border: 1px solid #eee;
            padding: 12px 24px;
            border-radius: 16px;
            white-space: nowrap;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .nav-pill.active {
            background: var(--dark);
            color: white;
            border-color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ÜRÜN KARTLARI */
        .container { padding: 0 20px 120px; max-width: 800px; margin: auto; }
        .section-header { 
            font-size: 24px; 
            font-weight: 700; 
            margin: 40px 0 20px; 
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-grid {
            display: grid;
            gap: 20px;
        }

        .item-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            transition: 0.3s;
        }

        .item-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #eee;
        }

        .item-body { padding: 20px; }
        .item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .item-title { font-size: 19px; font-weight: 700; color: var(--dark); margin: 0; }
        .item-price { font-size: 19px; font-weight: 700; color: var(--primary); }
        .item-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 15px; }

        /* NOT ALANI VE BUTON */
        .item-note {
            width: 100%;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }
        .item-note:focus { border-color: var(--primary); background: white; }

        .btn-add {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:active { transform: scale(0.96); }

        /* SEPET BAR (FLOATING) */
        .cart-bar {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--dark);
            color: white;
            padding: 18px 25px;
            border-radius: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 1100;
            cursor: pointer;
            animation: bounceUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceUp { from { bottom: -100px; } to { bottom: 30px; } }
        .cart-bar.active { display: flex; }

        /* MODAL (SEPET İNCELEME) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-sheet {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 30px 30px 0 0;
            padding: 30px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f1f1f1;
        }
        .btn-remove { color: #eb4d4b; border: none; background: none; font-size: 13px; font-weight: 600; }

        .btn-whatsapp {
            background: #27ae60;
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            font-size: 17px;
            margin-top: 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="header-fixed">
    <div class="top-bar">
        <h1 class="brand-logo">VENÜS<span>.</span></h1>
        <div style="font-size: 14px; font-weight: 600; background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 8px;">Açık</div>
    </div>
    <div class="nav-scroller">
        <div class="nav-pill active" onclick="go('penneler', this)">🍝 Penneler</div>
        <div class="nav-pill" onclick="go('tavuk', this)">🍗 Tavuk Menü</div>
        <div class="nav-pill" onclick="go('aperatif', this)">🍔 Aperatif & Burger</div>
        <div class="nav-pill" onclick="go('izgara', this)">🥩 Izgaralar</div>
        <div class="nav-pill" onclick="go('salata', this)">🥗 Salatalar</div>
        <div class="nav-pill" onclick="go('tatli', this)">🍰 Tatlılar</div>
    </div>
</div>

<div class="container" id="menu-container">
    </div>

<div class="cart-bar" id="cart-bar" onclick="openCart()">
    <div>
        <span id="cart-count" style="background: var(--primary); padding: 2px 10px; border-radius: 8px; margin-right: 8px;">0</span>
        <span style="font-weight: 600;">Siparişi İncele</span>
    </div>
    <div id="cart-total" style="font-size: 18px; font-weight: 700;">0₺</div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="margin:0; font-size:24px;">Siparişin 🛒</h2>
            <button onclick="closeCart()" style="border:none; background:none; font-size:24px;">✕</button>
        </div>
        <div id="cart-items-list"></div>
        <div style="margin-top:25px;">
            <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:800;">
                <span>Toplam</span>
                <span id="modal-total-val" style="color:var(--primary)">0₺</span>
            </div>
            <p style="font-size:13px; color:var(--text-muted); margin:15px 0;">Siparişiniz WhatsApp'a aktarıldığında lütfen açık adresinizi ekleyiniz.</p>
            <button class="btn-whatsapp" onclick="sendToWhatsApp()">Siparişi Tamamla</button>
        </div>
    </div>
</div>

<script>
    const menuData = {
        penneler: [
            {n:"Tavuklu Penne", p:290, d:"Tavuk Fleto, Yeşil/Kırmızı Biber, Mantar, Venüs özel sosu.", i:"https://images.unsplash.com/photo-1555072956-7758afb20e8f?w=500"},
            {n:"Sebzeli Penne", p:260, d:"Yeşil Biber, Kırmızı Biber, Mantar, Venüs özel sosu.", i:"https://images.unsplash.com/photo-1473093226795-af9932fe5856?w=500"},
            {n:"Köri Soslu Penne", p:230, d:"Köri sosu ve Venüs özel sosunun mükemmel uyumu.", i:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=500"}
        ],
        tavuk: [
            {n:"Barbekü Soslu Tavuk Menü", p:320, d:"Tavuk, Salata ve Makarna ile servis edilir.", i:"https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=500"},
            {n:"Köri Soslu Tavuk Menü", p:320, d:"Tavuk, Salata ve Makarna ile servis edilir.", i:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=500"}
        ],
        aperatif: [
            {n:"Venüs Burger Menü", p:320, d:"Özel Venüs soslu mantar, ev yapımı köfte, Cips ve İçecek.", i:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"},
            {n:"Tire Tost Menü", p:270, d:"Meşhur Tire Tostu, Cips ve Sütaş Ayran.", i:"https://images.unsplash.com/photo-1525351484163-7529414344d8?w=500"},
            {n:"Çıtır Tavuk Tabağı", p:290, d:"Çıtır Tavuk Fleto, Cips ve Bardak Cola.", i:"https://images.unsplash.com/photo-1562967914-608f82629710?w=500"}
        ],
        izgara: [
            {n:"Izgara Köfte", p:360, d:"Ev yapımı Köfte, Patates Cipsi, Salata.", i:"https://images.unsplash.com/photo-1529692236671-f1f6e9481b2b?w=500"},
            {n:"Ev Yapımı Mantı", p:250, d:"Süzme yoğurt ve özel sos ile.", i:"https://images.unsplash.com/photo-1616606103851-4089903c7395?w=500"}
        ],
        salata: [
            {n:"Akdeniz Salata", p:190, d:"Taze yeşillikler ve beyaz peynir.", i:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500"},
            {n:"Ton Balıklı Salata", p:240, d:"Ton balığı, mısır ve taze sebzeler.", i:"https://images.unsplash.com/photo-1546793665-c74683c3f38d?w=500"}
        ],
        tatli: [
            {n:"San Sebastian", p:160, d:"Vazgeçilmez tadıyla meşhur San Sebastian Cheesecake.", i:"https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=500"},
            {n:"Waffle", p:220, d:"Bol meyve ve gerçek çikolata ile.", i:"https://images.unsplash.com/photo-1562339106-6973d7223253?w=500"},
            {n:"Sufle", p:170, d:"Akışkan sıcak çikolata lezzeti.", i:"https://images.unsplash.com/photo-1624353365286-3f8d62daad51?w=500"}
        ]
    };

    let cart = [];

    function renderMenu() {
        const container = document.getElementById('menu-container');
        for (const [key, products] of Object.entries(menuData)) {
            let sectionHtml = `<div id="${key}"><div class="section-header">${getSectionTitle(key)}</div><div class="product-grid">`;
            products.forEach((p, idx) => {
                const uniqueId = `${key}-${idx}`;
                sectionHtml += `
                    <div class="item-card">
                        <img src="${p.i}" class="item-img" alt="${p.n}">
                        <div class="item-body">
                            <div class="item-top">
                                <h3 class="item-title">${p.n}</h3>
                                <span class="item-price">${p.p}₺</span>
                            </div>
                            <p class="item-desc">${p.d}</p>
                            <input type="text" class="item-note" id="n-${uniqueId}" placeholder="Notunuz (Mantar olmasın vb.)">
                            <button class="btn-add" onclick="addToCart('${p.n}', ${p.p}, 'n-${uniqueId}')">Sepete Ekle</button>
                        </div>
                    </div>
                `;
            });
            sectionHtml += `</div></div>`;
            container.innerHTML += sectionHtml;
        }
    }

    function getSectionTitle(key) {
        const titles = {penneler:'Pasta & Penne', tavuk:'Tavuk Menüleri', aperatif:'Aperatifler', izgara:'Izgara & Mantı', salata:'Taze Salatalar', tatli:'Tatlılar'};
        return titles[key];
    }

    function addToCart(name, price, noteId) {
        const note = document.getElementById(noteId).value;
        cart.push({ id: Date.now(), name, price, note });
        document.getElementById(noteId).value = "";
        updateUI();
        
        // Sepet animasyonu
        const bar = document.getElementById('cart-bar');
        bar.style.transform = "translateX(-50%) scale(1.05)";
        setTimeout(() => bar.style.transform = "translateX(-50%) scale(1)", 200);
    }

    function updateUI() {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-total').innerText = total + "₺";
        document.getElementById('modal-total-val').innerText = total + "₺";
        
        if(cart.length > 0) document.getElementById('cart-bar').classList.add('active');
        else { document.getElementById('cart-bar').classList.remove('active'); closeCart(); }
    }

    function openCart() {
        const list = document.getElementById('cart-items-list');
        list.innerHTML = "";
        cart.forEach(item => {
            list.innerHTML += `
                <div class="cart-row">
                    <div style="flex:1">
                        <div style="font-weight:700">${item.name}</div>
                        <div style="font-size:12px; color:var(--primary)">${item.note ? '📝 ' + item.note : ''}</div>
                        <div style="font-weight:600; margin-top:5px;">${item.price}₺</div>
                    </div>
                    <button class="btn-remove" onclick="removeFromCart(${item.id})">Kaldır</button>
                </div>
            `;
        });
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        updateUI();
        openCart();
    }

    function closeCart() { document.getElementById('modal-overlay').style.display = 'none'; }

    function go(id, btn) {
        const el = document.getElementById(id);
        window.scrollTo({ top: el.offsetTop - 160, behavior: 'smooth' });
        document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function sendToWhatsApp() {
        let text = "*YENİ SİPARİŞ (VENÜS BOWLING)*\n\n";
        cart.forEach((item, i) => {
            text += `*${i+1}. ${item.name}* - ${item.price}₺\n`;
            if(item.note) text += `   _Not: ${item.note}_\n`;
        });
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        text += `\n*TOPLAM: ${total}₺*\n\n*ADRES:* \n(Lütfen buraya teslimat adresinizi yazınız)`;
        window.open(`https://wa.me/905374271737?text=${encodeURIComponent(text)}`, '_blank');
    }

    window.onclick = e => { if(e.target.id === 'modal-overlay') closeCart(); }
    
    renderMenu();
</script>

</body>
</html>
